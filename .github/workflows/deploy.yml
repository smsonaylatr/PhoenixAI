name: Phoenix Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy Phoenix AI
        run: |
          git config --global --add safe.directory /opt/phoenix

          cd /opt/phoenix

          git fetch origin
          git reset --hard origin/main

          npm install

          pm2 describe phoenix-ai >/dev/null 2>&1

          if [ $? -eq 0 ]; then
              pm2 restart phoenix-ai --update-env
          else
              pm2 start npm --name phoenix-ai -- start
          fi

          pm2 save