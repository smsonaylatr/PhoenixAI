name: Phoenix Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy Phoenix AI
        shell: bash
        run: |
          git config --global --add safe.directory /opt/phoenix

          cd /opt/phoenix

          git fetch origin
          git reset --hard origin/main

          npm install --omit=dev

          if pm2 describe phoenix-ai > /dev/null 2>&1; then
            pm2 restart phoenix-ai --update-env
          else
            pm2 start npm --name phoenix-ai -- start
          fi

          pm2 save

          echo "Phoenix deploy tamamlandı."